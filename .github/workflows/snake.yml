name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Shakila46
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00ffff&color_dots=#0d0d0d,#0a2a2a,#0d4f4f,#00cccc,#00ffff
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00ffff&color_dots=#0d0d0d,#0a2a2a,#0d4f4f,#00cccc,#00ffff

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
