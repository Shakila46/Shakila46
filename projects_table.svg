  <text x="360" y="113" class="stack">Next.js · .NET · POS System</text>
  <text x="680" y="113" class="done">■ COMPLETE</text>
  <line x1="24" y1="122" x2="836" y2="122" class="sep"/>
</g>

<!-- Row 2: Mobile App -->
