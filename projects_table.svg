</g>

<!-- Row 4: Enterprise -->
<g class="row4">
  <rect x="24" y="184" width="812" height="28" class="row-hover"/>
  <text x="34"  y="203" class="td">🏢 Enterprise App Module</text>
  <text x="360" y="203" class="stack">Java EE · SQL Server</text>
  <text x="680" y="203" class="done">■ COMPLETE</text>
  <line x1="24" y1="212" x2="836" y2="212" class="sep"/>
</g>

<!-- Row 5: AI Helper -->
<g class="row5">
  <rect x="24" y="214" width="812" height="28" class="row-hover"/>
  <text x="34"  y="233" class="td">🤖 AI Assignment Helper</text>
  <text x="360" y="233" class="stack">Python · Streamlit · Groq API</text>
  <text x="680" y="233" class="done">■ COMPLETE</text>
  <line x1="24" y1="242" x2="836" y2="242" class="sep"/>
</g>

<!-- Row 6: SQA -->
<g class="row6">
  <rect x="24" y="244" width="812" height="28" class="row-hover"/>
  <text x="34"  y="263" class="td">🧪 SQA Implementation</text>
  <text x="360" y="263" class="stack">Manual Testing · Test Plans</text>
  <text x="680" y="263" class="done">■ COMPLETE</text>
  <line x1="24" y1="272" x2="836" y2="272" class="sep"/>
</g>

  <!-- Row 7: SQA -->
<g class="row6">
  <rect x="24" y="244" width="812" height="28" class="row-hover"/>
  <text x="34"  y="263" class="td">💰 Expense Tracker Implementation</text>
  <text x="360" y="263" class="stack">React · Node.js · MongoDB</text>
  <text x="680" y="263" class="done">■ COMPLETE</text>
  <line x1="24" y1="272" x2="836" y2="272" class="sep"/>
</g>

<!-- Footer -->
<text x="34"  y="298" font-family="Courier New,monospace" font-size="11" fill="#7B68EE">6 projects found  |  6 completed  |  0 in-progress</text>
<text x="720" y="298" font-family="Courier New,monospace" font-size="11" fill="#00ffff" opacity="0.5">[ OK ]</text>

<!-- Scanline -->
<rect width="860" height="60" class="scanline"/>
</g>
</svg>
