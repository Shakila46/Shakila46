<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg{fill:#0d0d0d;}
    .title-bar{fill:#0a1a2a;}
    .dot-r{fill:#ff5f57;} .dot-y{fill:#ffbd2e;} .dot-g{fill:#28c840;}
    .border{fill:none;stroke:#00ffff;stroke-width:1.5;opacity:0.6;}
    .th{font-family:'Courier New',monospace;font-size:13px;fill:#00ffff;font-weight:bold;}
    .td{font-family:'Courier New',monospace;font-size:12px;fill:#ccffff;}
    .stack{font-family:'Courier New',monospace;font-size:11px;fill:#7B68EE;}
    .done{font-family:'Courier New',monospace;font-size:11px;fill:#00ffff;}
    .sep{stroke:#00ffff;stroke-width:0.5;opacity:0.2;}
    .header-sep{stroke:#00ffff;stroke-width:1;opacity:0.5;}
    .row-hover{fill:#00ffff;opacity:0.03;}
    .section-title{font-family:'Courier New',monospace;font-size:15px;fill:#00ffff;font-weight:bold;letter-spacing:2px;}
    .corner{stroke:#00ffff;stroke-width:1.5;fill:none;opacity:0.7;}

    .row1{animation:fadein 0.4s ease 0.3s both;}
    .row2{animation:fadein 0.4s ease 0.6s both;}
    .row3{animation:fadein 0.4s ease 0.9s both;}
    .row4{animation:fadein 0.4s ease 1.2s both;}
    .row5{animation:fadein 0.4s ease 1.5s both;}
    .row6{animation:fadein 0.4s ease 1.8s both;}
    .header-row{animation:fadein 0.4s ease 0.1s both;}
    @keyframes fadein{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}

    .scanline{fill:url(#scanGrad);animation:sweep 5s linear infinite;}
    @keyframes sweep{0%{transform:translateY(-320px);}100%{transform:translateY(320px);}}
  </style>
  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ffff" stop-opacity="0.025"/>
    <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clip"><rect width="860" height="320"/></clipPath>
</defs>

<rect width="860" height="320" class="bg" rx="8"/>
<rect width="860" height="32" class="title-bar" rx="8"/>
<rect width="860" height="16" class="title-bar" y="16"/>
<circle cx="20" cy="16" r="5" class="dot-r"/>
<circle cx="36" cy="16" r="5" class="dot-y"/>
<circle cx="52" cy="16" r="5" class="dot-g"/>
<text x="430" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="12" fill="#7B68EE">shakila@nsbm: ~/projects</text>
<rect x="1" y="1" width="858" height="318" class="border" rx="8"/>
<polyline points="1,50 1,32 20,32" class="corner"/>
<polyline points="840,32 858,32 858,50" class="corner"/>
<polyline points="1,270 1,288 20,288" class="corner"/>
<polyline points="840,288 858,288 858,270" class="corner"/>

<g clip-path="url(#clip)">

<!-- Section title -->
<text x="24" y="58" class="section-title">$ ls ./projects --details</text>

<!-- Table header -->
<g class="header-row">
  <line x1="24" y1="70" x2="836" y2="70" class="header-sep"/>
  <text x="34"  y="86" class="th">PROJECT</text>
  <text x="360" y="86" class="th">STACK</text>
  <text x="680" y="86" class="th">STATUS</text>
  <line x1="24" y1="92" x2="836" y2="92" class="header-sep"/>
</g>

<!-- Row 1: Bidzy -->
<g class="row1">
