<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg { fill: #0d0d0d; }
    .border { fill: none; stroke: #00ffff; stroke-width: 1.5; opacity: 0.6; }
    .prompt { font-family: 'Courier New', monospace; font-size: 14px; fill: #00ffff; }
    .output { font-family: 'Courier New', monospace; font-size: 14px; fill: #ccffff; }
    .highlight { font-family: 'Courier New', monospace; font-size: 14px; fill: #00ffff; font-weight: bold; }
    .dim { font-family: 'Courier New', monospace; font-size: 14px; fill: #7B68EE; }
    .cursor { fill: #00ffff; }
    .title-bar { fill: #0a1a2a; }
    .dot-r { fill: #ff5f57; }
    .dot-y { fill: #ffbd2e; }
    .dot-g { fill: #28c840; }

    /* Line by line typewriter using clip-rect animation */
    .line1  { animation: reveal 0.5s steps(1) 0.5s both; }
    .line2  { animation: reveal 0.5s steps(1) 1.2s both; }
    .line3  { animation: reveal 0.5s steps(1) 1.8s both; }
    .line4  { animation: reveal 0.5s steps(1) 2.4s both; }
    .line5  { animation: reveal 0.5s steps(1) 3.0s both; }
    .line6  { animation: reveal 0.5s steps(1) 3.5s both; }
    .line7  { animation: reveal 0.5s steps(1) 4.0s both; }
    .line8  { animation: reveal 0.5s steps(1) 4.6s both; }
    .line9  { animation: reveal 0.5s steps(1) 5.1s both; }
    .line10 { animation: reveal 0.5s steps(1) 5.6s both; }
    .line11 { animation: reveal 0.5s steps(1) 6.1s both; }
    .line12 { animation: reveal 0.5s steps(1) 6.6s both; }
    .line13 { animation: reveal 0.5s steps(1) 7.1s both; }

    @keyframes reveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Blinking cursor */
    .cursor-blink {
      animation: blink 1s step-end infinite 7.5s;
      opacity: 0;
    }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* Scanline sweep */
    .scanline {
      fill: url(#scanGrad);
      animation: sweep 4s linear infinite;
    }
    @keyframes sweep {
      0%   { transform: translateY(-320px); }
      100% { transform: translateY(320px); }
    }
  </style>

  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#00ffff" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#00ffff" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
  </linearGradient>

  <clipPath id="clip"><rect width="860" height="320"/></clipPath>
</defs>

<!-- Background -->
<rect width="860" height="320" class="bg" rx="8"/>

<!-- Title bar -->
<rect width="860" height="32" class="title-bar" rx="8"/>
<rect width="860" height="16" class="title-bar" y="16"/>

<!-- Window dots -->
<circle cx="20" cy="16" r="5" class="dot-r"/>
<circle cx="36" cy="16" r="5" class="dot-y"/>
<circle cx="52" cy="16" r="5" class="dot-g"/>

<!-- Title -->
<text x="430" y="21" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#7B68EE">shakila@nsbm: ~</text>

<!-- Border -->
<rect x="1" y="1" width="858" height="318" class="border" rx="8"/>

<!-- Corner accents -->
<polyline points="1,50 1,32 20,32" stroke="#00ffff" stroke-width="1.5" fill="none" opacity="0.8"/>
<polyline points="840,32 858,32 858,50" stroke="#00ffff" stroke-width="1.5" fill="none" opacity="0.8"/>
<polyline points="1,270 1,288 20,288" stroke="#00ffff" stroke-width="1.5" fill="none" opacity="0.8"/>
<polyline points="840,288 858,288 858,270" stroke="#00ffff" stroke-width="1.5" fill="none" opacity="0.8"/>

<g clip-path="url(#clip)">

<!-- Line 1: prompt -->
<g class="line1">
  <text x="24" y="62" class="prompt">$ whoami</text>
</g>

<!-- Line 2 -->
<g class="line2">
  <text x="24" y="84" class="dim">╔══════════════════════════════════════════╗</text>
</g>

<!-- Line 3 -->
<g class="line3">
  <text x="24" y="104"><tspan class="dim">║  </tspan><tspan class="highlight">👤 </tspan><tspan class="output">Shakila Praween</tspan><tspan class="dim">                          ║</tspan></text>
</g>

<!-- Line 4 -->
<g class="line4">
  <text x="24" y="124"><tspan class="dim">║  </tspan><tspan class="highlight">🎓 </tspan><tspan class="output">BSc Software Engineering @ NSBM</tspan><tspan class="dim">          ║</tspan></text>
</g>

<!-- Line 5 -->
<g class="line5">
  <text x="24" y="144"><tspan class="dim">║  </tspan><tspan class="highlight">📍 </tspan><tspan class="output">Western Province, Sri Lanka 🇱🇰</tspan><tspan class="dim">          ║</tspan></text>
</g>

<!-- Line 6 -->
<g class="line6">
  <text x="24" y="164"><tspan class="dim">║  </tspan><tspan class="highlight">📅 </tspan><tspan class="output">Expected Grad: December 2027</tspan><tspan class="dim">             ║</tspan></text>
</g>

<!-- Line 7 -->
<g class="line7">
  <text x="24" y="184" class="dim">╚══════════════════════════════════════════╝</text>
</g>

<!-- Line 8: blank + next prompt -->
<g class="line8">
  <text x="24" y="204" class="prompt">$ cat status.txt</text>
</g>

<!-- Line 9 -->
<g class="line9">
  <text x="24" y="224"><tspan class="highlight">  🔨 </tspan><tspan class="output">Completed: </tspan><tspan class="prompt">Bidzy</tspan><tspan class="highlight"> ✅</tspan></text>
</g>

<!-- Line 10 -->
<g class="line10">
  <text x="24" y="244"><tspan class="highlight">  🔨 </tspan><tspan class="output">Latest Project: </tspan><tspan class="prompt">Bidzy POS System</tspan><tspan class="output"> (.NET · Next.js)</tspan></text>
</g>

<!-- Line 11 -->
<g class="line11">
  <text x="24" y="264"><tspan class="highlight">  ⚡ </tspan><tspan class="output">Stack: </tspan><tspan class="prompt">Flutter</tspan><tspan class="output"> · </tspan><tspan class="prompt">React</tspan><tspan class="output"> · </tspan><tspan class="prompt">.NET</tspan><tspan class="output"> · </tspan><tspan class="prompt">Next.js</tspan></text>
</g>

<!-- Line 12 -->
<g class="line12">
  <text x="24" y="284"><tspan class="highlight">  💡 </tspan><tspan class="dim">Clean Code  |  Test-Driven  |  User-First</tspan></text>
</g>

<!-- Line 13: final prompt + cursor -->
<g class="line13">
  <text x="24" y="304" class="prompt">$ <tspan class="cursor-blink">▋</tspan></text>
</g>

<!-- Scanline -->
<rect width="860" height="60" class="scanline"/>

</g>
</svg>
