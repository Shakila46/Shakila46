</g>

<!-- Footer -->
<line x1="24" y1="346" x2="836" y2="346" stroke="#00ffff" stroke-width="0.5" opacity="0.3"/>
<text x="34" y="366" font-family="Courier New,monospace" font-size="11" fill="#7B68EE">15+ languages &amp; frameworks loaded successfully</text>
<text x="700" y="366" font-family="Courier New,monospace" font-size="11" fill="#00ffff" opacity="0.5">[ OK ]</text>

<!-- Scanline -->
