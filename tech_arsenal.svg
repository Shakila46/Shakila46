<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg{fill:#0d0d0d;}
    .title-bar{fill:#0a1a2a;}
    .dot-r{fill:#ff5f57;} .dot-y{fill:#ffbd2e;} .dot-g{fill:#28c840;}
    .border{fill:none;stroke:#00ffff;stroke-width:1.5;opacity:0.6;}
    .corner{stroke:#00ffff;stroke-width:1.5;fill:none;opacity:0.7;}
    .section-title{font-family:'Courier New',monospace;font-size:15px;fill:#00ffff;font-weight:bold;letter-spacing:2px;}
    .cat-label{font-family:'Courier New',monospace;font-size:11px;fill:#7B68EE;letter-spacing:3px;}
    .badge-text{font-family:'Courier New',monospace;font-size:10px;font-weight:bold;fill:#0d0d0d;}
    .badge-text-dark{font-family:'Courier New',monospace;font-size:10px;font-weight:bold;fill:#00ffff;}
    .sep{stroke:#00ffff;stroke-width:0.5;opacity:0.15;}

    .scanline{fill:url(#scanGrad);animation:sweep 6s linear infinite;}
    @keyframes sweep{0%{transform:translateY(-420px);}100%{transform:translateY(420px);}}

    /* Category groups fade in */
    .cat1{animation:fadein 0.5s ease 0.2s both;}
    .cat2{animation:fadein 0.5s ease 0.5s both;}
    .cat3{animation:fadein 0.5s ease 0.8s both;}
    .cat4{animation:fadein 0.5s ease 1.1s both;}
    .cat5{animation:fadein 0.5s ease 1.4s both;}
    @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

    /* Badge pulse on hover - using animate */
    .badge{transition:all 0.2s;}
  </style>
  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ffff" stop-opacity="0.02"/>
    <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clip"><rect width="860" height="420"/></clipPath>
</defs>

<rect width="860" height="420" class="bg" rx="8"/>
<rect width="860" height="32" class="title-bar" rx="8"/>
<rect width="860" height="16" class="title-bar" y="16"/>
<circle cx="20" cy="16" r="5" class="dot-r"/>
<circle cx="36" cy="16" r="5" class="dot-y"/>
<circle cx="52" cy="16" r="5" class="dot-g"/>
<text x="430" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="12" fill="#7B68EE">shakila@nsbm: ~/tech-stack</text>
<rect x="1" y="1" width="858" height="418" class="border" rx="8"/>
<polyline points="1,50 1,32 20,32" class="corner"/>
<polyline points="840,32 858,32 858,50" class="corner"/>
<polyline points="1,370 1,388 20,388" class="corner"/>
<polyline points="840,388 858,388 858,370" class="corner"/>

<g clip-path="url(#clip)">

<text x="24" y="58" class="section-title">$ cat tech_stack.config</text>
<line x1="24" y1="66" x2="836" y2="66" stroke="#00ffff" stroke-width="1" opacity="0.4"/>

<!-- ══ MOBILE ══ -->
<g class="cat1">
  <text x="24" y="84" class="cat-label">▸ MOBILE</text>
  <!-- Flutter -->
  <rect x="24" y="90" width="90" height="24" fill="#02569B" rx="4"/>
  <image href="https://cdn.simpleicons.org/flutter/white" x="28" y="93" width="18" height="18"/>
  <text x="50" y="106" class="badge-text" fill="white">FLUTTER</text>
  <!-- Dart -->
