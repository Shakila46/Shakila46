<svg width="860" height="420" viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg{fill:#0d0d0d;}.title-bar{fill:#0a1a2a;}
    .border{fill:none;stroke:#00ffff;stroke-width:1.5;opacity:0.6;}
    .corner{stroke:#00ffff;stroke-width:1.5;fill:none;opacity:0.7;}
    .st{font-family:'Courier New',monospace;font-size:15px;fill:#00ffff;font-weight:bold;letter-spacing:2px;}
    .cl{font-family:'Courier New',monospace;font-size:11px;fill:#7B68EE;letter-spacing:3px;}
    .bt{font-family:'Courier New',monospace;font-size:10px;font-weight:bold;}
    .sep{stroke:#00ffff;stroke-width:0.5;opacity:0.15;}
    .cat1{animation:fi 0.5s ease 0.2s both;}.cat2{animation:fi 0.5s ease 0.5s both;}
    .cat3{animation:fi 0.5s ease 0.8s both;}.cat4{animation:fi 0.5s ease 1.1s both;}
    .cat5{animation:fi 0.5s ease 1.4s both;}
    @keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .sl{fill:url(#sg);animation:sw 6s linear infinite;}
    @keyframes sw{0%{transform:translateY(-420px);}100%{transform:translateY(420px);}}
  </style>
  <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ffff" stop-opacity="0.025"/>
    <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="cl2"><rect width="860" height="420"/></clipPath>
</defs>
<rect width="860" height="420" class="bg" rx="8"/>
<rect width="860" height="32" class="title-bar" rx="8"/>
<rect width="860" height="16" class="title-bar" y="16"/>
<circle cx="20" cy="16" r="5" fill="#ff5f57"/>
<circle cx="36" cy="16" r="5" fill="#ffbd2e"/>
<circle cx="52" cy="16" r="5" fill="#28c840"/>
<text x="430" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="12" fill="#7B68EE">shakila@nsbm: ~/tech-stack</text>
<rect x="1" y="1" width="858" height="418" class="border" rx="8"/>
<polyline points="1,50 1,32 20,32" class="corner"/>
<polyline points="840,32 858,32 858,50" class="corner"/>
<polyline points="1,370 1,388 20,388" class="corner"/>
<polyline points="840,388 858,388 858,370" class="corner"/>
<g clip-path="url(#cl2)">
<text x="24" y="58" class="st">$ cat tech_stack.config</text>
<line x1="24" y1="66" x2="836" y2="66" stroke="#00ffff" stroke-width="1" opacity="0.4"/>

