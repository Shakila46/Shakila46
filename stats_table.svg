<svg width="860" height="260" viewBox="0 0 860 260" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .bg{fill:#0d0d0d;}
    .title-bar{fill:#0a1a2a;}
    .dot-r{fill:#ff5f57;} .dot-y{fill:#ffbd2e;} .dot-g{fill:#28c840;}
    .border{fill:none;stroke:#00ffff;stroke-width:1.5;opacity:0.6;}
    .th{font-family:'Courier New',monospace;font-size:13px;fill:#00ffff;font-weight:bold;}
    .metric{font-family:'Courier New',monospace;font-size:12px;fill:#ccffff;}
    .value{font-family:'Courier New',monospace;font-size:13px;fill:#00ffff;font-weight:bold;}
    .sep{stroke:#00ffff;stroke-width:0.5;opacity:0.2;}
    .header-sep{stroke:#00ffff;stroke-width:1;opacity:0.5;}
    .section-title{font-family:'Courier New',monospace;font-size:15px;fill:#00ffff;font-weight:bold;letter-spacing:2px;}
    .corner{stroke:#00ffff;stroke-width:1.5;fill:none;opacity:0.7;}
    .bar-bg{fill:#0a2a2a;}
    .bar-fill{fill:#00ffff;opacity:0.8;}

    .row1{animation:fadein 0.4s ease 0.3s both;}
    .row2{animation:fadein 0.4s ease 0.55s both;}
    .row3{animation:fadein 0.4s ease 0.8s both;}
    .row4{animation:fadein 0.4s ease 1.05s both;}
    .row5{animation:fadein 0.4s ease 1.3s both;}
    @keyframes fadein{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}

    .bar1{animation:grow1 1s ease 0.6s both;}
    .bar2{animation:grow2 1s ease 0.85s both;}
    .bar3{animation:grow3 1s ease 1.1s both;}
    .bar4{animation:grow4 1s ease 1.35s both;}
    .bar5{animation:grow5 1s ease 1.6s both;}
    @keyframes grow1{from{width:0;}to{width:101px;}}
    @keyframes grow2{from{width:0;}to{width:60px;}}
    @keyframes grow3{from{width:0;}to{width:150px;}}
    @keyframes grow4{from{width:0;}to{width:130px;}}
    @keyframes grow5{from{width:0;}to{width:200px;}}

    .scanline{fill:url(#scanGrad);animation:sweep 5s linear infinite;}
    @keyframes sweep{0%{transform:translateY(-260px);}100%{transform:translateY(260px);}}
  </style>
  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#00ffff" stop-opacity="0"/>
    <stop offset="50%" stop-color="#00ffff" stop-opacity="0.025"/>
    <stop offset="100%" stop-color="#00ffff" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="clip"><rect width="860" height="260"/></clipPath>
</defs>

<rect width="860" height="260" class="bg" rx="8"/>
<rect width="860" height="32" class="title-bar" rx="8"/>
<rect width="860" height="16" class="title-bar" y="16"/>
<circle cx="20" cy="16" r="5" class="dot-r"/>
<circle cx="36" cy="16" r="5" class="dot-y"/>
<circle cx="52" cy="16" r="5" class="dot-g"/>
<text x="430" y="21" text-anchor="middle" font-family="Courier New,monospace" font-size="12" fill="#7B68EE">shakila@nsbm: ~/stats</text>
<rect x="1" y="1" width="858" height="258" class="border" rx="8"/>
<polyline points="1,50 1,32 20,32" class="corner"/>
<polyline points="840,32 858,32 858,50" class="corner"/>
<polyline points="1,218 1,236 20,236" class="corner"/>
<polyline points="840,236 858,236 858,218" class="corner"/>

<g clip-path="url(#clip)">

<text x="24" y="58" class="section-title">$ cat github_stats.json</text>

<!-- Header -->
<line x1="24" y1="68" x2="836" y2="68" class="header-sep"/>
<text x="34"  y="84" class="th">METRIC</text>
<text x="340" y="84" class="th">VALUE</text>
<text x="480" y="84" class="th">PROGRESS</text>
<line x1="24" y1="90" x2="836" y2="90" class="header-sep"/>

<!-- Row 1 -->
<g class="row1">
  <text x="34"  y="112" class="metric">📅 GitHub Since</text>
  <text x="340" y="112" class="value">Aug 2024</text>
  <rect x="480" y="101" width="200" height="8" class="bar-bg" rx="4"/>
  <rect x="480" y="101" width="101" height="8" class="bar-fill bar1" rx="4"/>
  <line x1="24" y1="120" x2="836" y2="120" class="sep"/>
</g>

<!-- Row 2 -->
<g class="row2">
  <text x="34"  y="142" class="metric">🔥 Longest Streak</text>
  <text x="340" y="142" class="value">4 days</text>
  <rect x="480" y="131" width="200" height="8" class="bar-bg" rx="4"/>
  <rect x="480" y="131" width="60" height="8" class="bar-fill bar2" rx="4"/>
  <line x1="24" y1="150" x2="836" y2="150" class="sep"/>
</g>

<!-- Row 3 -->
<g class="row3">
  <text x="34"  y="172" class="metric">💻 Total Contributions</text>
  <text x="340" y="172" class="value">101+</text>
  <rect x="480" y="161" width="200" height="8" class="bar-bg" rx="4"/>
  <rect x="480" y="161" width="150" height="8" class="bar-fill bar3" rx="4"/>
  <line x1="24" y1="180" x2="836" y2="180" class="sep"/>
</g>

<!-- Row 4 -->
<g class="row4">
  <text x="34"  y="202" class="metric">📦 Repositories</text>
  <text x="340" y="202" class="value">13+</text>
  <rect x="480" y="191" width="200" height="8" class="bar-bg" rx="4"/>
  <rect x="480" y="191" width="130" height="8" class="bar-fill bar4" rx="4"/>
  <line x1="24" y1="210" x2="836" y2="210" class="sep"/>
</g>

<!-- Footer -->
<text x="34" y="240" font-family="Courier New,monospace" font-size="11" fill="#7B68EE">last updated: auto  |  timezone: Asia/Colombo</text>
<text x="700" y="240" font-family="Courier New,monospace" font-size="11" fill="#00ffff" opacity="0.5">[ OK ]</text>

<rect width="860" height="60" class="scanline"/>
</g>
</svg>
